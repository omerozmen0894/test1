workflows:
  ios-appstore:
    name: Wrap Maze iOS - App Store Connect
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: default
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.wrapmaze.game
        APP_NAME: Wrap Maze
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Show versions
        script: |
          flutter config --no-enable-swift-package-manager
          flutter --version
          xcodebuild -version
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Patch FlutterFire iOS modular imports
        script: |
          PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
          HOSTED_DIR="$PUB_CACHE_DIR/hosted/pub.dev"

          patch_imports() {
            local package_prefix="$1"
            local header_import="$2"
            find "$HOSTED_DIR" -path "*/${package_prefix}-*/ios/Classes/*" \( -name "*.h" -o -name "*.m" \) -type f -print0 2>/dev/null \
              | xargs -0 perl -0pi -e "s/(#import\\s+<Firebase\\/Firebase\\.h>|@import\\s+Firebase\\w*;)/#import <${header_import}>/g"
          }

          patch_imports "firebase_core" "FirebaseCore/FirebaseCore.h"
          patch_imports "firebase_auth" "FirebaseAuth/FirebaseAuth.h"
          patch_imports "firebase_database" "FirebaseDatabase/FirebaseDatabase.h"
          patch_imports "cloud_firestore" "FirebaseFirestore/FirebaseFirestore.h"

          echo "Patched FlutterFire iOS headers for modular Firebase imports."
      - name: Install iOS pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch iOS signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: |
          keychain add-certificates
      - name: Configure iOS signing settings
        script: |
          set -euo pipefail

          PROFILE_PATH=$(
            find \
              "$HOME/Library/MobileDevice/Provisioning Profiles" \
              "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" \
              -name "*.mobileprovision" -print 2>/dev/null | head -n 1
          )

          if [ -z "${PROFILE_PATH:-}" ]; then
            echo "No iOS provisioning profile was found after fetch-signing-files."
            echo "Available profiles:"
            find "$HOME/Library" -name "*.mobileprovision" -print 2>/dev/null || true
            exit 1
          fi

          echo "Using provisioning profile file: $PROFILE_PATH"
          PROFILE_PLIST="$CM_BUILD_DIR/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$PROFILE_PLIST")

          {
            echo ""
            echo "DEVELOPMENT_TEAM=$TEAM_ID"
            echo "CODE_SIGN_STYLE=Manual"
            echo "CODE_SIGN_IDENTITY=Apple Distribution"
            echo "CODE_SIGN_IDENTITY[sdk=iphoneos*]=Apple Distribution"
            echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME"
            echo "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]=$PROFILE_NAME"
          } >> ios/Flutter/Release.xcconfig
          echo "Using provisioning profile: $PROFILE_NAME"
          echo "Using Apple team: $TEAM_ID"
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-method=app-store
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
