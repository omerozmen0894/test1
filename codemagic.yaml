workflows:
  ios-appstore:
    name: Wrap Maze iOS - App Store Connect
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: 26.0
      cocoapods: default
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.wrapmaze.game
        APP_NAME: Wrap Maze
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Show versions
        script: |
          flutter config --no-enable-swift-package-manager
          flutter --version
          xcodebuild -version
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Patch FlutterFire iOS modular imports
        script: |
          set -euo pipefail
          PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
          HOSTED_DIR="$PUB_CACHE_DIR/hosted/pub.dev"

          patch_imports() {
            local package_prefix="$1"
            local replacement="$2"
            for package_dir in "$HOSTED_DIR"/"$package_prefix"-*; do
              [ -d "$package_dir/ios/Classes" ] || continue
              echo "Patching $package_dir"
              find "$package_dir/ios/Classes" -type f \( -name "*.h" -o -name "*.m" \) -print0 \
                | xargs -0 perl -0pi -e "s|#import\\s+<Firebase/Firebase\\.h>|${replacement}|g; s|@import\\s+Firebase\\w+;|${replacement}|g"
            done
          }

          patch_imports "firebase_core" "#import <FirebaseCore/FirebaseCore.h>"
          patch_imports "firebase_auth" "#import <FirebaseCore/FirebaseCore.h>\n#import <FirebaseAuth/FirebaseAuth.h>"
          patch_imports "firebase_database" "#import <FirebaseCore/FirebaseCore.h>\n#import <FirebaseDatabase/FirebaseDatabase.h>"
          patch_imports "cloud_firestore" "#import <FirebaseCore/FirebaseCore.h>\n#import <FirebaseFirestore/FirebaseFirestore.h>"

          if find "$HOSTED_DIR" -path "*/firebase_*/ios/Classes/*" -type f \( -name "*.h" -o -name "*.m" \) -exec grep -H "#import <Firebase/Firebase.h>" {} + 2>/dev/null | grep .; then
            echo "FlutterFire Firebase umbrella imports are still present after patch."
            exit 1
          fi

          echo "Patched FlutterFire iOS headers for modular Firebase imports."
      - name: Install iOS pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch iOS signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: |
          keychain add-certificates
      - name: Configure iOS signing settings
        script: |
          set -euo pipefail

          PROFILE_PATH=$(
            find \
              "$HOME/Library/MobileDevice/Provisioning Profiles" \
              "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" \
              -name "*.mobileprovision" -print 2>/dev/null | head -n 1
          )

          if [ -z "${PROFILE_PATH:-}" ]; then
            echo "No iOS provisioning profile was found after fetch-signing-files."
            echo "Available profiles:"
            find "$HOME/Library" -name "*.mobileprovision" -print 2>/dev/null || true
            exit 1
          fi

          echo "Using provisioning profile file: $PROFILE_PATH"
          PROFILE_PLIST="$CM_BUILD_DIR/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$PROFILE_PLIST")

          {
            echo ""
            echo "DEVELOPMENT_TEAM=$TEAM_ID"
            echo "CODE_SIGN_STYLE=Manual"
            echo "CODE_SIGN_IDENTITY=Apple Distribution"
            echo "CODE_SIGN_IDENTITY[sdk=iphoneos*]=Apple Distribution"
            echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME"
            echo "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]=$PROFILE_NAME"
          } >> ios/Flutter/Release.xcconfig
          echo "Using provisioning profile: $PROFILE_NAME"
          echo "Using Apple team: $TEAM_ID"
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-method=app-store
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
