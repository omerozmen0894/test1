workflows:
  ios-appstore:
    name: Wrap Maze iOS - App Store Connect
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.wrapmaze.game
        APP_NAME: Wrap Maze
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Show versions
        script: |
          flutter --version
          xcodebuild -version
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install iOS pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch iOS signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: |
          keychain add-certificates
      - name: Configure iOS signing settings
        script: |
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -n 1)
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist)
          {
            echo ""
            echo "DEVELOPMENT_TEAM=$TEAM_ID"
            echo "CODE_SIGN_STYLE=Manual"
            echo "CODE_SIGN_IDENTITY=Apple Distribution"
            echo "CODE_SIGN_IDENTITY[sdk=iphoneos*]=Apple Distribution"
            echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME"
            echo "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]=$PROFILE_NAME"
          } >> ios/Flutter/Release.xcconfig
          echo "Using provisioning profile: $PROFILE_NAME"
          echo "Using Apple team: $TEAM_ID"
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-method=app-store
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
