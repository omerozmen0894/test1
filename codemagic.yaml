workflows:
  ios-appstore:
    name: Wrap Maze iOS - App Store Connect
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.wrapmaze.game
        APP_NAME: Wrap Maze
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Show versions
        script: |
          flutter --version
          xcodebuild -version
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install iOS pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch iOS signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles \
            --project "ios/*.xcodeproj" \
            --archive-method app-store \
            --code-signing-setup-verbose-logging \
            --warn-only
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-method=app-store
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
